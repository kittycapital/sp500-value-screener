name: Update S&P 500 Value Screener Data

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00 전날)에 실행
    - cron: '0 22 * * 0-4'  # 평일만 (Sun-Thu UTC = Mon-Fri KST)
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance --break-system-packages

      - name: Fetch data from Yahoo Finance
        run: python fetch_data.py
        timeout-minutes: 30

      - name: Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet --cached || git commit -m "📊 Update S&P 500 data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
